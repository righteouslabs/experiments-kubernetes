server:
  port: 8080

spring:
  application:
    name: document-producer

app:
  dapr:
    pubsub-name: kafka-pubsub
    topic: documents
    http-port: ${DAPR_HTTP_PORT:3500}
  producer:
    interval-ms: ${PRODUCER_INTERVAL_MS:1000}
  schema-registry:
    url: ${SCHEMA_REGISTRY_URL:http://schema-registry:8081}
