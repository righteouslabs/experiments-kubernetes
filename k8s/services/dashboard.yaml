##
## Pipeline Dashboard — lightweight FastHTML web UI
##
## Shows real-time consumer stats, Schema Registry subjects,
## and Dapr routing rules. Auto-refreshes every 3 seconds.
##
## Exposed via NodePort 30501 on the MicroShift container,
## mapped to the host in docker-compose.yml.
## Open: http://localhost:30501
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: versioned-demo
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      enableServiceLinks: false
      containers:
        - name: dashboard
          image: docker.io/library/demo-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          env:
            - name: CONSUMER_URL
              value: "http://consumer.versioned-demo.svc.cluster.local:8080"
            - name: SCHEMA_REGISTRY_URL
              value: "http://schema-registry.versioned-demo.svc.cluster.local:8081"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: versioned-demo
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30501
---
apiVersion: v1
kind: Service
metadata:
  name: consumer
  namespace: versioned-demo
spec:
  selector:
    app: consumer
  ports:
    - port: 8080
      targetPort: 8080
