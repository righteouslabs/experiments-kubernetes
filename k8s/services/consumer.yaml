apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: versioned-demo
  labels:
    app: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      enableServiceLinks: false
      containers:
        - name: consumer
          image: docker.io/library/document-consumer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: DAPR_HTTP_PORT
              value: "3500"
            - name: SUPPORTED_VERSIONS
              value: "1,2,3"
            - name: SPRING_APPLICATION_NAME
              value: "consumer"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"

        - name: daprd
          image: docker.io/daprio/daprd:1.12.4
          command:
            - "./daprd"
            - "-app-id"
            - "consumer"
            - "-app-port"
            - "8080"
            - "-placement-host-address"
            - "dapr-placement.versioned-demo.svc.cluster.local:50006"
            - "-resources-path"
            - "/components"
            - "-log-level"
            - "info"
          ports:
            - containerPort: 3500
          volumeMounts:
            - name: dapr-components
              mountPath: /components
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "192Mi"
              cpu: "200m"

      volumes:
        - name: dapr-components
          configMap:
            name: dapr-components
