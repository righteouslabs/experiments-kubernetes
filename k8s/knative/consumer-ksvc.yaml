---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: consumer-v3
  namespace: versioned-demo
  labels:
    app: consumer
    version: v3
  annotations:
    dapr.io/enabled: "true"
    dapr.io/app-id: "consumer-v3"
    dapr.io/app-port: "8080"
spec:
  template:
    metadata:
      name: consumer-v3-rev1
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        dapr.io/enabled: "true"
        dapr.io/app-id: "consumer-v3"
        dapr.io/app-port: "8080"
    spec:
      containers:
        - image: document-consumer:latest
          ports:
            - containerPort: 8080
          env:
            - name: SUPPORTED_VERSIONS
              value: "3"
            - name: SPRING_APPLICATION_NAME
              value: "consumer-v3"
            - name: DAPR_HTTP_PORT
              value: "3500"

##
## Example: traffic-splitting for a canary rollout
##
## When deploying a new consumer revision that also supports v3,
## you can split traffic between the old and new revisions:
##
##   spec:
##     traffic:
##       - revisionName: consumer-v3-rev1
##         percent: 80
##       - revisionName: consumer-v3-rev2
##         percent: 20
##         tag: canary
##
## This routes 80% of v3 messages to the existing revision and 20%
## to the new one, letting you validate the new logic before full rollout.
