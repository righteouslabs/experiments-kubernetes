##
## Knative Service: Single consumer with revision-based versioning
##
## Current revision handles all schema versions (1,2,3).
## When V4 is added:
##   1. Change SUPPORTED_VERSIONS to "1,2,3,4"
##   2. Deploy -> Knative creates a new revision automatically
##   3. Traffic split between old and new revision for canary rollout
##
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: consumer
  namespace: versioned-demo
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        dapr.io/enabled: "true"
        dapr.io/app-id: "consumer"
        dapr.io/app-port: "8080"
    spec:
      containers:
        - image: document-consumer:latest
          ports:
            - containerPort: 8080
          env:
            - name: SUPPORTED_VERSIONS
              value: "1,2,3"
            - name: SPRING_APPLICATION_NAME
              value: "consumer"
            - name: DAPR_HTTP_PORT
              value: "3500"
  ##
  ## Traffic splitting for canary rollout when adding V4:
  ##
  ## After deploying with SUPPORTED_VERSIONS="1,2,3,4", Knative creates
  ## a new revision. You can then split traffic:
  ##
  ##   traffic:
  ##     - revisionName: consumer-00001   # old: handles v1,v2,v3
  ##       percent: 80
  ##     - latestRevision: true           # new: handles v1,v2,v3,v4
  ##       percent: 20
  ##       tag: canary
  ##
  ## Once validated, shift 100% to the new revision.
  ##
