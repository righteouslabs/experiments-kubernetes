##
## Knative Services for versioned consumers
##
## Each Knative Service represents a consumer that handles a specific set of
## schema versions.  Knative provides:
##   - Automatic scale-to-zero when no messages are flowing
##   - Revision management for rolling out new versions
##   - Traffic splitting between revisions for canary/blue-green deploys
##
## The traffic block at the bottom shows how to split traffic between
## different revisions of the same service.
##
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: consumer-v1
  namespace: versioned-demo
  labels:
    app: consumer
    version: v1
  annotations:
    dapr.io/enabled: "true"
    dapr.io/app-id: "consumer-v1"
    dapr.io/app-port: "8080"
spec:
  template:
    metadata:
      name: consumer-v1-rev1
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        dapr.io/enabled: "true"
        dapr.io/app-id: "consumer-v1"
        dapr.io/app-port: "8080"
    spec:
      containers:
        - image: document-consumer:latest
          ports:
            - containerPort: 8080
          env:
            - name: SUPPORTED_VERSIONS
              value: "1"
            - name: SPRING_APPLICATION_NAME
              value: "consumer-v1"
            - name: DAPR_HTTP_PORT
              value: "3500"
---
