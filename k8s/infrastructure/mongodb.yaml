apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: versioned-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      enableServiceLinks: false
      containers:
        - name: mongodb
          image: docker.io/library/mongo:7.0
          ports:
            - containerPort: 27017
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: versioned-demo
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
