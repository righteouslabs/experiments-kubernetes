# Node: enricher revision v2 (ENRICH_MODE=scored adds priority + fraudScore).
# Stage 2 of 2: apply AFTER 20-enricher-v1.yaml is Ready.
# Tags give pinned URLs: v1-enricher.lattice-demo.svc.cluster.local and
# v2-enricher.lattice-demo.svc.cluster.local — the edges Triggers route to.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: enricher
  namespace: lattice-demo
spec:
  template:
    metadata:
      name: enricher-v2
      annotations:
        autoscaling.knative.dev/minScale: "0"
    spec:
      containers:
        - image: dev.local/lattice-functions:v1
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CLOUD_FUNCTION_DEFINITION
              value: enrich
            - name: ENRICH_MODE
              value: scored
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
  traffic:
    - revisionName: enricher-v1
      tag: v1
      percent: 0
      latestRevision: false
    - revisionName: enricher-v2
      tag: v2
      percent: 100
      latestRevision: false
