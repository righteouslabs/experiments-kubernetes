###############################################################################
# Multi-Version Microservice Demo — Full Kubernetes (MicroShift)
#
# One command brings up MicroShift, builds Java images, loads them into the
# cluster, and deploys Kafka + MongoDB + Schema Registry + Dapr + versioned
# consumer services — all as native Kubernetes pods.
#
# Usage:
#   docker compose up --detach
#   export KUBECONFIG=$(pwd)/microshift-docker-compose/kubeconfig
#   kubectl -n versioned-demo get pods            # check status
#   kubectl -n versioned-demo logs -l app=producer -f   # watch producer
#   docker compose down -v                        # full teardown
#
# Standalone (no K8s, pure Docker):
#   docker compose -f docker-compose.standalone.yml up --build
###############################################################################

# Include the MicroShift submodule's compose file, which provides:
#   lvm-setup, microshift, kubeconfig, cluster-setup, openshift-console
#   volumes: microshift-data, console-data
include:
  - path: ./microshift-docker-compose/docker-compose.yml

services:

  # =========================================================================
  # Override MicroShift: more memory + dashboard NodePort
  # =========================================================================

  microshift:
    mem_limit: 12g
    memswap_limit: 12g
    ports:
      - "6443:6443"
      - "9000:9000"
      - "30501:30501"   # NodePort for dashboard (http://localhost:30501)
      - "30502:30502"   # NodePort for document-enricher actuator (low-code stage)
      - "30503:30503"   # NodePort for package-router actuator (low-code stage, Phase 2)

  # =========================================================================
  # Phase 1: Build custom Java images and load into MicroShift's CRI-O
  # =========================================================================

  image-builder:
    image: docker:27-cli
    container_name: demo-image-builder
    depends_on:
      microshift:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the entire repo root so the low-code services (which pull in
      # ../commons-observability via Gradle composite build) have access to
      # their sibling library at build time. Individual services still live
      # under their subdirectories.
      - ./:/workspace/repo:ro
      # Writable dashboard dir so we can stage AsyncAPI assets before build.
      - ./dashboard:/workspace/dashboard
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e

        echo "============================================"
        echo " Phase 1: Building & loading images"
        echo "============================================"

        echo ""
        echo "--- Building document-producer ---"
        docker build -t document-producer:latest /workspace/repo/producer

        echo ""
        echo "--- Building document-consumer ---"
        docker build -t document-consumer:latest /workspace/repo/consumer-service

        echo ""
        echo "--- Building document-enricher (low-code SCF stage) ---"
        docker build -t document-enricher:latest \
          -f /workspace/repo/lowcode-scf/Dockerfile /workspace/repo

        echo ""
        echo "--- Building package-router (low-code DMN stage, Phase 2) ---"
        docker build -t package-router:latest \
          -f /workspace/repo/package-router/Dockerfile /workspace/repo

        echo ""
        echo "--- Staging AsyncAPI spec into dashboard build context ---"
        mkdir -p /workspace/dashboard/lowcode
        cp /workspace/repo/lowcode-scf/asyncapi.yaml /workspace/dashboard/lowcode/asyncapi.yaml
        if [ -d /workspace/repo/lowcode-scf/public ]; then
          cp -r /workspace/repo/lowcode-scf/public /workspace/dashboard/lowcode/public
        fi

        echo ""
        echo "--- Building dashboard ---"
        docker build -t demo-dashboard:latest /workspace/dashboard

        echo ""
        echo "--- Pre-pulling infrastructure images ---"
        docker pull confluentinc/cp-zookeeper:7.5.0
        docker pull confluentinc/cp-kafka:7.5.0
        docker pull confluentinc/cp-schema-registry:7.5.0
        docker pull mongo:7.0
        docker pull daprio/placement:1.12.4
        docker pull daprio/daprd:1.12.4
        docker pull provectuslabs/kafka-ui:latest

        echo ""
        echo "--- Loading ALL images into MicroShift (podman -> CRI-O) ---"
        for img in \
            document-producer:latest \
            document-consumer:latest \
            document-enricher:latest \
            package-router:latest \
            demo-dashboard:latest \
            confluentinc/cp-zookeeper:7.5.0 \
            confluentinc/cp-kafka:7.5.0 \
            confluentinc/cp-schema-registry:7.5.0 \
            mongo:7.0 \
            daprio/placement:1.12.4 \
            daprio/daprd:1.12.4 \
            provectuslabs/kafka-ui:latest; do
          echo "  Loading $$img..."
          docker save "$$img" | docker exec -i microshift podman load
        done

        echo ""
        echo "--- Verifying images in MicroShift ---"
        docker exec microshift crictl images | grep -E "document|package|confluent|mongo|dapr|kafka-ui"

        echo ""
        echo "Phase 1 complete."

  # =========================================================================
  # Phase 2: Deploy everything to the MicroShift Kubernetes cluster
  # =========================================================================

  cluster-deploy:
    image: bitnami/kubectl:latest
    container_name: demo-cluster-deploy
    user: "0:0"
    depends_on:
      image-builder:
        condition: service_completed_successfully
    volumes:
      - microshift-data:/var/lib/microshift:ro
      - ./k8s:/k8s:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        export KUBECONFIG=/var/lib/microshift/resources/kubeadmin/microshift/kubeconfig

        echo "============================================"
        echo " Phase 2: Deploying to MicroShift"
        echo "============================================"

        # Wait for the API server to be fully responsive (not just kubeconfig file existing)
        echo ""
        echo "[0/8] Waiting for API server..."
        for i in $$(seq 1 30); do
            if kubectl get nodes >/dev/null 2>&1; then
                echo "API server ready."
                break
            fi
            echo "  Attempt $$i/30 - API server not ready yet, waiting 10s..."
            sleep 10
        done
        kubectl get nodes

        # --- Namespace (with permissive pod security for demo) ---
        echo ""
        echo "[1/8] Creating namespace and configuring security..."
        kubectl apply -f /k8s/namespace.yaml
        kubectl label namespace versioned-demo \
          pod-security.kubernetes.io/enforce=privileged \
          pod-security.kubernetes.io/warn=privileged \
          --overwrite

        # Grant the default SA the privileged SCC so infrastructure images
        # (Confluent, Mongo) can run as root or their expected UIDs
        echo "Binding privileged SCC to default service account..."
        kubectl patch scc privileged --type='json' \
          -p='[{"op":"add","path":"/users/-","value":"system:serviceaccount:versioned-demo:default"}]' 2>/dev/null || true
        kubectl patch scc anyuid --type='json' \
          -p='[{"op":"add","path":"/users/-","value":"system:serviceaccount:versioned-demo:default"}]' 2>/dev/null || true

        # Brief pause for SCC admission cache to update
        sleep 5

        # --- Dapr placement service + component ConfigMap ---
        echo ""
        echo "[2/8] Deploying Dapr placement service..."
        kubectl apply -f /k8s/dapr/

        # --- Infrastructure (Kafka + ZooKeeper + Schema Registry + MongoDB) ---
        echo ""
        echo "[3/8] Deploying infrastructure..."
        kubectl apply -f /k8s/infrastructure/

        echo "Waiting for ZooKeeper..."
        kubectl -n versioned-demo wait --for=condition=available deployment/zookeeper --timeout=600s

        echo "Waiting for Kafka..."
        kubectl -n versioned-demo wait --for=condition=available deployment/kafka --timeout=600s

        echo "Waiting for Schema Registry..."
        kubectl -n versioned-demo wait --for=condition=available deployment/schema-registry --timeout=600s

        echo "Waiting for MongoDB..."
        kubectl -n versioned-demo wait --for=condition=available deployment/mongodb --timeout=600s

        echo "Infrastructure ready."

        # --- Producer ---
        echo ""
        echo "[4/8] Deploying producer..."
        kubectl apply -f /k8s/services/producer.yaml

        # --- Consumer (handles all schema versions) ---
        echo ""
        echo "[5/8] Deploying consumer (handles all schema versions)..."
        kubectl apply -f /k8s/services/consumer.yaml

        # --- Document Enricher (low-code SCF stage) ---
        echo ""
        echo "[6/9] Installing KEDA (best-effort) and deploying document-enricher..."
        if ! kubectl get crd scaledobjects.keda.sh >/dev/null 2>&1; then
            echo "KEDA CRDs not found, attempting install..."
            kubectl apply --server-side -f https://github.com/kedacore/keda/releases/download/v2.14.0/keda-2.14.0.yaml || \
                echo "WARNING: KEDA install failed. ScaledObject will be skipped, Deployment continues."
        else
            echo "KEDA already installed."
        fi
        # Apply Deployment+Service first (always succeeds), then ScaledObject (tolerated)
        kubectl apply -f /k8s/services/document-enricher.yaml || true
        if ! kubectl get crd scaledobjects.keda.sh >/dev/null 2>&1; then
            echo "Skipping ScaledObject (KEDA CRDs unavailable)."
        fi

        # --- Package Router (low-code DMN stage, Phase 2) ---
        echo ""
        echo "[7/9] Deploying package-router (DMN decision-table stage)..."
        kubectl apply -f /k8s/services/package-router.yaml

        # --- Dashboard ---
        echo ""
        echo "[8/9] Deploying dashboard..."
        kubectl apply -f /k8s/services/dashboard.yaml

        # --- Wait for everything ---
        echo ""
        echo "[9/9] Waiting for all services to be ready..."
        kubectl -n versioned-demo wait --for=condition=available deployment/producer          --timeout=300s
        kubectl -n versioned-demo wait --for=condition=available deployment/consumer          --timeout=300s
        kubectl -n versioned-demo wait --for=condition=available deployment/document-enricher --timeout=300s || true
        # Kogito needs a little longer to warm up than plain Spring Cloud Function.
        kubectl -n versioned-demo wait --for=condition=available deployment/package-router    --timeout=420s || true
        kubectl -n versioned-demo wait --for=condition=available deployment/dashboard         --timeout=300s

        echo ""
        echo "============================================"
        echo " All services deployed successfully!"
        echo "============================================"
        echo ""
        kubectl -n versioned-demo get pods
        echo ""
        echo "To watch logs:"
        echo "  export KUBECONFIG=\$$(pwd)/microshift-docker-compose/kubeconfig"
        echo "  kubectl -n versioned-demo logs -l app=producer -f"
        echo "  kubectl -n versioned-demo logs -l app=consumer -f"
        echo "  kubectl -n versioned-demo logs -l app=document-enricher -f"

  # =========================================================================
  # Low-code stage observability: Prometheus + Grafana as plain Docker
  # services. They scrape the document-enricher via MicroShift's NodePort
  # 30502 (the microshift container hostname resolves on the shared network).
  # =========================================================================

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: demo-prometheus
    depends_on:
      microshift:
        condition: service_healthy
    ports:
      - "9091:9090"   # host 9091 -> container 9090 (avoids conflicts on 9090)
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
      - --web.enable-lifecycle
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: demo-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_DEFAULT_THEME=light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
